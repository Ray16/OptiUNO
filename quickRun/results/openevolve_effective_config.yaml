max_iterations: 150
checkpoint_interval: 10
log_level: INFO
random_seed: 42
diff_based_evolution: true
llm:
  provider: claude_code
  models:
  - name: sonnet
    weight: 1.0
    max_budget_usd: 1.0
  temperature: 0.7
  max_tokens: 4096
  timeout: 300
  retries: 3
prompt:
  system_message: 'You are optimizing the run-time configuration of UNO, a modular
    solver

    for nonlinearly constrained optimization. The program is a Python dict

    with exactly six options; each option has a small fixed set of legal

    values listed in the comments. Change ONLY option values (never keys,

    never the structure), and only to listed legal values.


    The configuration is scored on 123 Hock-Schittkowski test problems:

    reliability (fraction solved) dominates; lower cumulative CPU time

    breaks ties. Artifacts from previous runs list unsolved problems and

    their termination status - use them to reason about which ingredient

    (Hessian model, globalization mechanism/strategy, inequality handling,

    inertia correction) is the likely bottleneck. Note that some

    combinations fail or are silently rewritten by UNO on some problem

    classes; that is part of the search landscape.

    '
database:
  population_size: 100
  archive_size: 50
  num_islands: 3
  feature_dimensions:
  - reliability
  - cum_cpu_time
  feature_bins: 12
evaluator:
  timeout: 900
  parallel_evaluations: 1
  cascade_evaluation: false
